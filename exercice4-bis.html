<body>
    <script>
        function piramid() {
            let entre = prompt("Donnez taille du motif :");
            let taille = parseInt(entre);

            let etoiles = "";
            
            for (let i = 1; i <= taille; i++) {        
                let espaces = " ".repeat(taille - i);                
                let etoiles = "*".repeat((2 * i) - 1);
                console.log(espaces + etoiles);
            }
        }
        piramid();
    </script>
</body>
