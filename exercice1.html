<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>
    <script>
        function degreC() {
            let entre = prompt("Une température en Fahrenheit :");
            let tempF = parseFloat(entre);

            let tempC= (5 / 9) * (tempF - 32);

            let output = "Cette température équivant a degrés " + tempC.toFixed(2) + " Celsins"
            console.log(output);
        }
        degreC();
    </script>
</body>
