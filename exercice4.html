<body>
    <script>
        function triangle1() {
            let entre = prompt("Un motif de taille:");
            let taille = parseInt(entre);

            let etoiles = ""; 
            let newTaille = 1;

            while (newTaille <= taille) {
                etoiles = etoiles + "*"; 
                console.log(etoiles);
                newTaille++;
            }
        }

        triangle1();
    </script>
