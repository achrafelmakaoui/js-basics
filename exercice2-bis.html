<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP4 - EXERCICE2-BIS</title>
</head>
<body>
    <script>
        function hjms() {
            let entre = prompt("Une durée en secondes :");
            let temps = parseInt(entre);

            if (temps === 0) {
                let output = "0 seconde";
                console.log(output)
            }

            let jours = Math.floor(temps / 86400);
            let resteSecondes = temps % 86400;

            let heures = Math.floor(resteSecondes / 3600);
            resteSecondes = resteSecondes % 3600;

            let minutes = Math.floor(resteSecondes / 60);
            let secondes = resteSecondes % 60;

            let parties = [];

            if (jours > 0) {
                if (jours === 1) {
                    parties.push(jours + " jour");
                } else {
                    parties.push(jours + " jours");
                }
            }

            if (heures > 0) {
                if (heures === 1) {
                    parties.push(heures + " heure");
                } else {
                    parties.push(heures + " heures");
                }
            }

            if (minutes > 0) {
                if (minutes === 1) {
                    parties.push(minutes + " minute");
                } else {
                    parties.push(minutes + " minutes");
                }
            }

            if (secondes > 0) {
                parties.push(secondes + (secondes === 1 ? " seconde" : " secondes"));
            }

            let output = parties.join(" ");
            console.log(output);
        }
        hjms();
    </script>
</body>
</html>
