<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP4 - EXERCICE7</title>
</head>
<body>
    <script>
        function racal1() {
            let entre = prompt("Pour un nombre A entre 1 et 100:");
            let A = parseFloat(entre);

            let u = A / 2
            
            while (Math.abs(u * u - A) >= 0.0001) {
                u = 0.5 * (u + A / u);
            }

            console.log("Valeur approchée de la racine carrée =" + u);

        }
        racal1();
    </script>
</body>
</html>
