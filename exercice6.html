        function fibo2() {
            let entre = prompt("Entrez n:");
            let n = parseInt(entre);

            let u0 = 0;
            let u1  = 1;
            let rang = 1;

            while (u1 <= n) {
                let temp = u0 + u1;
                u0 = u1;
                u1 = temp;
                rang++;
            }

            if (n === 0) {
                console.log(0)
            } else if (n === 1) {
                console.log(1)
            } else{
                console.log(`Premier terme > ${n} : u(${rang}) = ${u1}`);
            };
        }
        fibo2();
